services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: promptly
      POSTGRES_PASSWORD: promptly
      POSTGRES_DB: promptly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://promptly:promptly@db:5432/promptly

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:

